<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    HTML:
    HTML is the language used to build the structure of a webpage.

    You can think of HTML like the frame of a building.
    It decides what parts exist on the page:
    - headings
    - paragraphs
    - buttons
    - tables
    - input boxes

    The browser reads the HTML from top to bottom.
  -->
  <title>Students</title>

  <style>
    /*
      CSS:
      CSS is used to control how the page LOOKS.

      HTML creates the parts.
      CSS styles the parts.

      CSS can change:
      - colour
      - size
      - spacing
      - borders
      - layout
      - alignment

      A CSS rule has:
      selector {
        property: value;
      }

      Example:
      body {
        background: #f7f7f7;
      }

      This means:
      "find the body element and give it this background colour"
    */

    /*
      The body selector styles the whole visible page.
      This is a good place to set the default font and page spacing.
    */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f7f7f7;
      color: #222;
    }

    /*
      .container means "any element with class='container'"

      This is used to keep the page content centred and stop it becoming too wide.
      max-width means the content can grow up to 1000px wide but no wider.
      margin: 0 auto centres it on the page.
    */
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    /*
      .card creates the white boxes on the page.
      This gives them:
      - white background
      - light border
      - rounded corners
      - padding inside
      - space underneath
    */
    .card {
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    /*
      h1, h2 means style both heading levels together.
      margin-top: 0 removes the default gap above headings.
    */
    h1, h2 {
      margin-top: 0;
    }

    /*
      These are the main status messages.
      font-weight: bold makes them stand out more clearly.
    */
    #status, #insert-status {
      font-weight: bold;
      margin-bottom: 12px;
    }

    /*
      These classes are used to colour text depending on meaning.
      They are applied by JavaScript.

      .ok    = success
      .warn  = warning
      .error = problem
    */
    .ok { color: #0a7a33; }
    .warn { color: #9a6700; }
    .error { color: #b00020; }

    /*
      .form-row uses flexbox.

      Flexbox is a layout system for arranging items in a row or column.
      Here it makes the input boxes and button sit next to each other.

      gap adds space between them.
      flex-wrap allows them to move onto another line on smaller screens.
      align-items: end lines them up nicely at the bottom.
    */
    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
      margin-top: 10px;
    }

    /*
      .field is used for each label/input pair.
      display: flex and flex-direction: column put the label above the input.
    */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 220px;
    }

    /*
      This styles all input boxes.
      padding gives space inside the box.
      border-radius rounds the corners slightly.
    */
    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    /*
      This styles all buttons on the page.
      cursor: pointer makes the mouse show a hand when hovering.
    */
    button {
      padding: 12px 18px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    /*
      :hover means "when the mouse is over the button"
      This makes the button darker when hovered over.
    */
    button:hover {
      background: #1d4ed8;
    }

    /*
      This styles the table.
      border-collapse: collapse joins borders together into neat single lines.
      width: 100% makes the table stretch across the box.
    */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    /*
      th = table heading cell
      td = table data cell

      These rules style both types of table cells.
    */
    th, td {
      border: 1px solid #ccc;
      padding: 10px 12px;
      text-align: left;
    }

    /*
      This gives the heading row a light grey background.
    */
    th {
      background: #f2f2f2;
    }

    /*
      pre is used for the debug box.
      It keeps spacing and line breaks exactly as written.
      Useful for showing JSON or debug text.
    */
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f6f6f6;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin: 0;
    }

    /*
      Each log line gets a small border underneath
      so they look like separate steps.
    */
    .log-line {
      padding: 4px 0;
      border-bottom: 1px solid #eee;
      font-family: monospace;
      font-size: 0.95rem;
    }

    .log-line:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <!--
    BODY:
    Everything inside the <body> is what appears on the webpage.

    The page is divided into sections using <div> boxes.
    Each card is a clear area with a different job.
  -->

  <div class="container">
    <!--
      Main page heading.
      There should usually only be one h1 on a page.
    -->
    <h1>Students</h1>

    <!--
      CARD 1:
      This section lets the user add a new student.

      label = text telling the user what the box is for
      input = box where the user types
      button = clickable control to run code
    -->
    <div class="card">
      <h2>Add a New Student</h2>
      <div id="insert-status" class="warn">Enter a name and score, then click the button.</div>

      <div class="form-row">
        <div class="field">
          <label for="student-name">Name</label>
          <input id="student-name" type="text" placeholder="Enter name">
        </div>

        <div class="field">
          <label for="student-score">Score</label>
          <input id="student-score" type="number" placeholder="Enter score">
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="add-student-btn">Add Student</button>
        </div>
      </div>
    </div>

    <!--
      CARD 2:
      This shows status updates and the step-by-step log.

      The log is useful for debugging because it shows
      what the program has done so far.
    -->
    <div class="card">
      <div id="status" class="warn">Loading students...</div>
      <div id="log"></div>
    </div>

    <!--
      CARD 3:
      This is the data table.

      thead = table heading section
      tbody = table body section

      JavaScript will replace the starting row with real rows from Supabase.
    -->
    <div class="card">
      <h2>Students Table</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr>
            <td colspan="3">No data loaded yet.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!--
      CARD 4:
      This debug box is useful during development.
      It can show returned JSON or errors.
    -->
    <div class="card">
      <h2>Debug Output</h2>
      <pre id="debug">Nothing yet.</pre>
    </div>
  </div>

  <script>
    /*
      JAVASCRIPT:
      JavaScript makes the webpage interactive.

      It can:
      - react to button clicks
      - send requests to an API
      - update HTML on the page
      - show returned data
    */

    /*
      This is the URL of the Supabase project.
      It is the address the webpage will contact.
    */
    const supabaseUrl = 'https://scoeovigzizwufxxdwmk.supabase.co';

    /*
      This is the publishable API key.

      API:
      An API is a way for one program to talk to another program.

      In this case:
      - the webpage talks to Supabase
      - Supabase sends back data

      This is a publishable key, not a secret key.
      A publishable key is okay to use in frontend code.
    */
    const supabaseKey = 'PASTE_YOUR_SB_PUBLISHABLE_KEY_HERE';

    /*
      document.getElementById finds specific HTML elements by their id.
      We store them in variables so we can update them later.
    */
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const tableBody = document.getElementById('table-body');
    const debugEl = document.getElementById('debug');
    const insertStatusEl = document.getElementById('insert-status');
    const addStudentBtn = document.getElementById('add-student-btn');
    const studentNameInput = document.getElementById('student-name');
    const studentScoreInput = document.getElementById('student-score');

    /*
      This updates the main status message.
    */
    function setStatus(message, className = 'warn') {
      statusEl.textContent = message;
      statusEl.className = className;
    }

    /*
      This updates the message for the insert form.
    */
    function setInsertStatus(message, className = 'warn') {
      insertStatusEl.textContent = message;
      insertStatusEl.className = className;
    }

    /*
      This adds a line into the log box.
    */
    function addLog(message) {
      const div = document.createElement('div');
      div.className = 'log-line';
      div.textContent = message;
      logEl.appendChild(div);
    }

    /*
      JSON:
      JSON stands for JavaScript Object Notation.
      It is a common way to send structured data.

      Example:
      [
        { "id": 1, "name": "Alice", "score": 82 },
        { "id": 2, "name": "Ben", "score": 74 }
      ]

      This function prints JSON or text into the debug box.
    */
    function setDebug(obj) {
      debugEl.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
    }

    /*
      ASYNCHRONOUS CODE:
      Requests across the internet take time.

      async means:
      "this function includes work that may take time"

      await means:
      "pause here until the result comes back"

      This stops the code from trying to use data before it arrives.
    */
    async function loadStudents() {
      try {
        /*
          GET request:
          GET means "please send me data"

          This URL asks Supabase for:
          - the students table
          - only the id, name and score columns
          - in ascending order by id
        */
        const response = await fetch(
          `${supabaseUrl}/rest/v1/students?select=id,name,score&order=id.asc`,
          {
            method: 'GET',
            headers: {
              /*
                headers are extra pieces of information sent with the request
              */
              apikey: supabaseKey,
              Authorization: `Bearer ${supabaseKey}`,
              Accept: 'application/json'
            }
          }
        );

        const text = await response.text();
        let data;

        try {
          /*
            JSON.parse turns JSON text into JavaScript data.
          */
          data = JSON.parse(text);
        } catch {
          data = null;
        }

        if (!response.ok) {
          setStatus(`GET failed: ${response.status} ${response.statusText}`, 'error');
          setDebug(text);
          return;
        }

        if (!Array.isArray(data) || data.length === 0) {
          setStatus('Connected, but no rows were returned.', 'warn');
          tableBody.innerHTML = '<tr><td colspan="3">No records found.</td></tr>';
          setDebug(data);
          return;
        }

        setStatus(`Loaded ${data.length} row(s).`, 'ok');
        tableBody.innerHTML = '';

        /*
          Loop through the returned rows and build HTML table rows.
        */
        data.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.id ?? ''}</td>
            <td>${row.name ?? ''}</td>
            <td>${row.score ?? ''}</td>
          `;
          tableBody.appendChild(tr);
        });

        setDebug(data);
      } catch (err) {
        setStatus('Fetch error: ' + err.message, 'error');
        setDebug({ error: err.message });
      }
    }

    /*
      POST request:
      POST means "I want to send new data"

      This function reads what the user typed,
      sends it to Supabase,
      then reloads the table.
    */
    async function addStudent() {
      const name = studentNameInput.value.trim();
      const score = Number(studentScoreInput.value);

      /*
        Validation:
        Check the input before sending it.
      */
      if (!name) {
        setInsertStatus('Please enter a name.', 'error');
        return;
      }

      if (Number.isNaN(score)) {
        setInsertStatus('Please enter a valid score.', 'error');
        return;
      }

      addStudentBtn.disabled = true;
      setInsertStatus('Adding student...', 'warn');

      try {
        const response = await fetch(`${supabaseUrl}/rest/v1/students`, {
          method: 'POST',
          headers: {
            apikey: supabaseKey,
            Authorization: `Bearer ${supabaseKey}`,
            'Content-Type': 'application/json',
            Prefer: 'return=representation'
          },

          /*
            JSON.stringify converts JavaScript data into JSON text
            so it can be sent to the server.
          */
          body: JSON.stringify([{ name, score }])
        });

        const text = await response.text();
        let data;

        try {
          data = JSON.parse(text);
        } catch {
          data = text;
        }

        if (!response.ok) {
          setInsertStatus(`Insert failed: ${response.status} ${response.statusText}`, 'error');
          setDebug(data);
          return;
        }

        setInsertStatus(`Added ${name} successfully.`, 'ok');

        /*
          Clear the boxes after a successful insert.
        */
        studentNameInput.value = '';
        studentScoreInput.value = '';

        /*
          Reload the table so the new row appears.
        */
        await loadStudents();
      } catch (err) {
        setInsertStatus('Insert error: ' + err.message, 'error');
        setDebug({ error: err.message });
      } finally {
        /*
          finally always runs at the end,
          whether the request worked or failed
        */
        addStudentBtn.disabled = false;
      }
    }

    /*
      Event listener:
      When the button is clicked, run addStudent()
    */
    addStudentBtn.addEventListener('click', addStudent);

    /*
      Start by loading the students when the page opens.
    */
    loadStudents();
  </script>
</body>
</html>
