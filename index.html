<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Students Table</title>
  <style>
    :root {
      --border: #d9d9d9;
      --bg-head: #f5f5f5;
      --text: #222;
      --error: #b00020;
      --ok: #0a7a33;
    }

    body {
      font-family: Arial, sans-serif;
      color: var(--text);
      margin: 0;
      padding: 24px;
      background: #fff;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }

    .status {
      margin: 12px 0 18px;
      font-size: 0.95rem;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--error);
      white-space: pre-wrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
    }

    th {
      background: var(--bg-head);
    }

    .muted {
      color: #666;
      font-size: 0.95rem;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.92rem;
      color: #666;
    }

    code {
      background: #f7f7f7;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Students</h1>
    <p class="muted">This page reads the <code>students</code> table from Supabase and displays it below.</p>

    <div class="card">
      <div id="status" class="status">Loading data...</div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr>
            <td colspan="3">Loading...</td>
          </tr>
        </tbody>
      </table>

      <div class="footer-note">
        Remember: this page uses your Supabase <strong>publishable</strong> key, not the secret key.
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabaseUrl = 'https://sceovigzizwufxxdwmk.supabase.co';
    const supabaseKey = 'sb_publishable_v_G_lT7-22fyG6gurTUSsw_Ks_vgcOo';

    const statusEl = document.getElementById('status');
    const tableBody = document.getElementById('table-body');

    const supabase = createClient(supabaseUrl, supabaseKey);

    async function loadStudents() {
      statusEl.className = 'status';
      statusEl.textContent = 'Loading data...';

      const { data, error } = await supabase
        .from('students')
        .select('id, name, score')
        .order('id', { ascending: true });

      if (error) {
        statusEl.className = 'status error';
        statusEl.textContent = 'Error loading data: ' + error.message;
        tableBody.innerHTML = '<tr><td colspan="3">No data shown</td></tr>';
        return;
      }

      if (!data || data.length === 0) {
        statusEl.className = 'status';
        statusEl.textContent = 'Connected, but no rows were returned.';
        tableBody.innerHTML = '<tr><td colspan="3">No records found</td></tr>';
        return;
      }

      statusEl.className = 'status ok';
      statusEl.textContent = 'Connected successfully. ' + data.length + ' record(s) loaded.';

      tableBody.innerHTML = '';

      for (const row of data) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${row.id ?? ''}</td>
          <td>${row.name ?? ''}</td>
          <td>${row.score ?? ''}</td>
        `;
        tableBody.appendChild(tr);
      }
    }

    loadStudents();
  </script>
</body>
</html>
