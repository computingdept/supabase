<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Students</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    #status, #insert-status {
      font-weight: bold;
      margin-bottom: 12px;
    }

    .ok { color: #0a7a33; }
    .warn { color: #9a6700; }
    .error { color: #b00020; }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
      margin-top: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 220px;
    }

    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px 12px;
      text-align: left;
    }

    th {
      background: #f2f2f2;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f6f6f6;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin: 0;
    }

    .log-line {
      padding: 4px 0;
      border-bottom: 1px solid #eee;
      font-family: monospace;
      font-size: 0.95rem;
    }

    .log-line:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Students</h1>

    <div class="card">
      <h2>Add a New Student</h2>
      <div id="insert-status" class="warn">Enter a name and score, then click the button.</div>

      <div class="form-row">
        <div class="field">
          <label for="student-name">Name</label>
          <input id="student-name" type="text" placeholder="Enter name">
        </div>

        <div class="field">
          <label for="student-score">Score</label>
          <input id="student-score" type="number" placeholder="Enter score">
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="add-student-btn">Add Student</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div id="status" class="warn">Loading students...</div>
      <div id="log"></div>
    </div>

    <div class="card">
      <h2>Students Table</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr>
            <td colspan="3">No data loaded yet.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <h2>Debug Output</h2>
      <pre id="debug">Nothing yet.</pre>
    </div>
  </div>

  <script>
    const supabaseUrl = 'https://scoeovigzizwufxxdwmk.supabase.co';
    const supabaseKey = 'sb_publishable_v_G_lT7-22fyG6gurTUSsw_Ks_vgcOo';

    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const tableBody = document.getElementById('table-body');
    const debugEl = document.getElementById('debug');
    const insertStatusEl = document.getElementById('insert-status');
    const addStudentBtn = document.getElementById('add-student-btn');
    const studentNameInput = document.getElementById('student-name');
    const studentScoreInput = document.getElementById('student-score');

    function setStatus(message, className = 'warn') {
      statusEl.textContent = message;
      statusEl.className = className;
    }

    function setInsertStatus(message, className = 'warn') {
      insertStatusEl.textContent = message;
      insertStatusEl.className = className;
    }

    function addLog(message) {
      const div = document.createElement('div');
      div.className = 'log-line';
      div.textContent = message;
      logEl.appendChild(div);
    }

    function setDebug(obj) {
      debugEl.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
    }

    async function loadStudents() {
      try {
        const response = await fetch(
          `${supabaseUrl}/rest/v1/students?select=id,name,score&order=id.asc`,
          {
            method: 'GET',
            headers: {
              apikey: supabaseKey,
              Authorization: `Bearer ${supabaseKey}`,
              Accept: 'application/json'
            }
          }
        );

        const text = await response.text();
        let data;

        try {
          data = JSON.parse(text);
        } catch {
          data = null;
        }

        if (!response.ok) {
          setStatus(`GET failed: ${response.status} ${response.statusText}`, 'error');
          setDebug(text);
          return;
        }

        if (!Array.isArray(data) || data.length === 0) {
          setStatus('Connected, but no rows were returned.', 'warn');
          tableBody.innerHTML = '<tr><td colspan="3">No records found.</td></tr>';
          setDebug(data);
          return;
        }

        setStatus(`Loaded ${data.length} row(s).`, 'ok');
        tableBody.innerHTML = '';

        data.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.id ?? ''}</td>
            <td>${row.name ?? ''}</td>
            <td>${row.score ?? ''}</td>
          `;
          tableBody.appendChild(tr);
        });

        setDebug(data);
      } catch (err) {
        setStatus('Fetch error: ' + err.message, 'error');
        setDebug({ error: err.message });
      }
    }

    async function addStudent() {
      const name = studentNameInput.value.trim();
      const score = Number(studentScoreInput.value);

      if (!name) {
        setInsertStatus('Please enter a name.', 'error');
        return;
      }

      if (Number.isNaN(score)) {
        setInsertStatus('Please enter a valid score.', 'error');
        return;
      }

      addStudentBtn.disabled = true;
      setInsertStatus('Adding student...', 'warn');

      try {
        const response = await fetch(`${supabaseUrl}/rest/v1/students`, {
          method: 'POST',
          headers: {
            apikey: supabaseKey,
            Authorization: `Bearer ${supabaseKey}`,
            'Content-Type': 'application/json',
            Prefer: 'return=representation'
          },
          body: JSON.stringify([{ name, score }])
        });

        const text = await response.text();
        let data;

        try {
          data = JSON.parse(text);
        } catch {
          data = text;
        }

        if (!response.ok) {
          setInsertStatus(`Insert failed: ${response.status} ${response.statusText}`, 'error');
          setDebug(data);
          return;
        }

        setInsertStatus(`Added ${name} successfully.`, 'ok');
        studentNameInput.value = '';
        studentScoreInput.value = '';
        await loadStudents();
      } catch (err) {
        setInsertStatus('Insert error: ' + err.message, 'error');
        setDebug({ error: err.message });
      } finally {
        addStudentBtn.disabled = false;
      }
    }

    addStudentBtn.addEventListener('click', addStudent);
    loadStudents();
  </script>
</body>
</html>
