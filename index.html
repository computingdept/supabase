<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Students Table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    p {
      margin-top: 0;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      padding: 20px;
    }

    #status {
      margin-bottom: 16px;
      font-weight: bold;
    }

    .error {
      color: #b00020;
    }

    .success {
      color: #0a7a33;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px 12px;
      text-align: left;
    }

    th {
      background: #f2f2f2;
    }

    .note {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #666;
    }

    code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Students</h1>
    <p>This page reads the <code>students</code> table from Supabase and displays it below.</p>

    <div class="card">
      <div id="status">Loading data...</div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr>
            <td colspan="3">Loading...</td>
          </tr>
        </tbody>
      </table>

      <div class="note">
        This page uses your Supabase publishable key, not the secret key.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://sceovigzizwufxxdwmk.supabase.co';
    const supabaseKey = 'sb_publishable_v_G_lT7-22fyG6gurTUSsw_Ks_vgcOo';

    const statusEl = document.getElementById('status');
    const tableBody = document.getElementById('table-body');

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function loadStudents() {
      try {
        const { data, error } = await supabase
          .from('students')
          .select('id, name, score')
          .order('id', { ascending: true });

        if (error) {
          statusEl.className = 'error';
          statusEl.textContent = 'Error loading data: ' + error.message;
          tableBody.innerHTML = '<tr><td colspan="3">No data shown</td></tr>';
          console.error(error);
          return;
        }

        if (!data || data.length === 0) {
          statusEl.className = '';
          statusEl.textContent = 'Connected, but no rows were returned.';
          tableBody.innerHTML = '<tr><td colspan="3">No records found</td></tr>';
          return;
        }

        statusEl.className = 'success';
        statusEl.textContent = 'Loaded ' + data.length + ' student record(s).';

        tableBody.innerHTML = '';

        data.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.id ?? ''}</td>
            <td>${row.name ?? ''}</td>
            <td>${row.score ?? ''}</td>
          `;
          tableBody.appendChild(tr);
        });
      } catch (err) {
        statusEl.className = 'error';
        statusEl.textContent = 'Error loading data: ' + err.message;
        tableBody.innerHTML = '<tr><td colspan="3">No data shown</td></tr>';
        console.error(err);
      }
    }

    loadStudents();
  </script>
</body>
</html>
